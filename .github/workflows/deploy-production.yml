name: Deploy production to EC2

on:
  push:
    branches: [ main ]

jobs:
  run-ec2-deploy-script:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - id: configure-ssh
        name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.EC2_SERVER_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "Host myserver " >> ~/.ssh/config
          echo "  HostName ${{ vars.EC2_SERVER_HOST }}" >> ~/.ssh/config
          echo "  User ${{ secrets.EC2_SERVER_USER }}" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/id_rsa" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
      - id: run-ec2-deploy-script-via-ssh
        name: Run Deployment Script
        run: |
          ssh -t myserver \
            'cd ${{ vars.EC2_DEPLOY_ROOT_DIR }}; \
            ./deploy.sh ${{ github.ref_name }} ${{ vars.APP_NAME }} ${{ vars.APP_SERVER_PORT }} ${{ vars.APP_FRAMEWORK}} $(pwd)'