<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title desc">
  <title id="title">Hotels hero</title>
  <desc id="desc">Architectural skyline with warm dusk lighting.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#102640"/>
      <stop offset="55%" stop-color="#1e4965"/>
      <stop offset="100%" stop-color="#3c6e7a"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8d8bf"/>
      <stop offset="100%" stop-color="#b38f62"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect y="650" width="1600" height="250" fill="#0b2037" fill-opacity="0.62"/>
  <g fill="url(#tower)">
    <rect x="170" y="240" width="190" height="460" rx="10"/>
    <rect x="410" y="170" width="250" height="530" rx="10"/>
    <rect x="720" y="220" width="220" height="480" rx="10"/>
    <rect x="1010" y="150" width="300" height="550" rx="10"/>
  </g>
  <g fill="#fff3d8" fill-opacity="0.4">
    <rect x="220" y="320" width="18" height="28"/><rect x="260" y="320" width="18" height="28"/><rect x="300" y="320" width="18" height="28"/>
    <rect x="460" y="260" width="22" height="34"/><rect x="510" y="260" width="22" height="34"/><rect x="560" y="260" width="22" height="34"/>
    <rect x="770" y="300" width="20" height="30"/><rect x="820" y="300" width="20" height="30"/><rect x="870" y="300" width="20" height="30"/>
    <rect x="1080" y="250" width="24" height="36"/><rect x="1135" y="250" width="24" height="36"/><rect x="1190" y="250" width="24" height="36"/>
  </g>
</svg>
