<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title desc">
  <title id="title">Andacity home hero</title>
  <desc id="desc">Layered mountains, horizon glow, and route arcs to suggest multi-vertical travel planning.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1d3a"/>
      <stop offset="45%" stop-color="#204a73"/>
      <stop offset="100%" stop-color="#2a7d8c"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="35%" r="38%">
      <stop offset="0%" stop-color="#ffd7a8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffd7a8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ridgeA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123153"/>
      <stop offset="100%" stop-color="#0f2544"/>
    </linearGradient>
    <linearGradient id="ridgeB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3d64"/>
      <stop offset="100%" stop-color="#163554"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#sun)"/>
  <path d="M0 680L220 560L420 640L620 510L860 650L1100 540L1320 620L1600 500V900H0Z" fill="url(#ridgeB)"/>
  <path d="M0 760L250 620L470 700L760 560L980 720L1260 600L1600 700V900H0Z" fill="url(#ridgeA)"/>
  <g fill="none" stroke="#b6dfff" stroke-opacity="0.45" stroke-width="3">
    <path d="M180 280C420 140 640 120 860 240C1020 330 1180 350 1400 260"/>
    <path d="M120 360C360 260 580 270 790 360C980 440 1180 470 1450 390"/>
  </g>
</svg>
